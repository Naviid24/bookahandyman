<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Your Estimate</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>


<body>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-6 text-center">

                <h1 class="mb-4">

                    Your job estimate

                </h1>


                <p class="text-muted">

                    Based on the information
                    you've provided:

                </p>


                <div class="card p-4 mb-4">

                    <p>

                        {{ job.description }}

                    </p>

                </div>


                <!-- Temporary price -->
                <h2 class="mb-4">

                    Estimated price:

                    <strong>
                        £60
                    </strong>

                </h2>


                <p class="text-muted">

                    This is a temporary price.
                    We will replace this with our
                    real pricing system.

                </p>


                <button
                    class="btn btn-primary btn-lg w-100"
                >

                    Continue to booking

                </button>

            </div>

        </div>

    </div>

</body>

</html>
